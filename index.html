<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Евгений Курдаков — Избранное</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #f4f1ea;
}

/* ОБЛОЖКА */
.cover {
  text-align: center;
  padding: 30px;
  background: linear-gradient(180deg, #b22222, #f4a460);
  color: white;
}

.cover img {
  max-width: 300px;
  border: 5px solid white;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

.cover h1 {
  margin-top: 20px;
  font-size: 36px;
}

.cover h2 {
  font-weight: normal;
}

/* ПОИСК */
.search {
  padding: 20px;
  background: white;
}

.search input {
  width: 100%;
  padding: 10px;
  font-size: 16px;
}

/* СПИСОК */
.list {
  padding: 20px;
}

.item {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  cursor: pointer;
}

.item:hover {
  background: #eee;
}

/* МОДАЛКА */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  max-width: 700px;
  max-height: 80%;
  overflow: auto;
  padding: 20px;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 20px;
}
</style>

</head>
<body>

<div class="cover">
  <img src="Евгений Курдаков-Избранное.jpeg">
  <h1>Евгений Курдаков</h1>
  <h2>Избранное</h2>
</div>

<div class="search">
  <input id="search" placeholder="Поиск стихотворения...">
</div>

<div class="list" id="list"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="close" onclick="closeModal()">✖</div>
    <h2 id="modal-title"></h2>
    <div id="modal-text" style="white-space: pre-line;"></div>
  </div>
</div>

<script>
let poems = [];

fetch('poems_full.json')
  .then(r => r.json())
  .then(data => {
    poems = data;
    render(poems);
  });

function render(list) {
  const el = document.getElementById('list');
  el.innerHTML = '';

  list.forEach(p => {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<b>${p.title}</b><br><small>${p.section}</small>`;
    
    div.onclick = () => openPoem(p);

    el.appendChild(div);
  });
}

function openPoem(p) {
  document.getElementById('modal-title').innerText = p.title;
  document.getElementById('modal-text').innerText = p.text;
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();

  const filtered = poems.filter(p =>
    p.title.toLowerCase().includes(q) ||
    p.text.toLowerCase().includes(q)
  );

  render(filtered);
});
</script>

</body>
</html>
